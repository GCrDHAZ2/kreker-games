<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kreker Games</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00e5ff; --green: #22c55e; --bg: #020617; --card: #0f172a; --border: rgba(0,229,255,0.15); }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: white; font-family: 'Rajdhani', sans-serif; min-height: 100vh; overflow-x: hidden; }
        
        /* Background Grid */
        body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(0,229,255,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,255,0.025) 1px, transparent 1px); background-size: 60px 60px; pointer-events: none; z-index: 0; }
        
        nav { position: sticky; top: 0; z-index: 100; display: flex; align-items: center; gap: 20px; padding: 0 40px; height: 56px; background: rgba(2,6,23,0.95); border-bottom: 1px solid var(--border); backdrop-filter: blur(12px); }
        .nav-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .nav-logo-circle { width: 34px; height: 34px; border-radius: 50%; border: 2px solid var(--neon); display: flex; align-items: center; justify-content: center; font-family: 'Orbitron', sans-serif; font-size: 11px; color: var(--neon); box-shadow: 0 0 10px rgba(0,229,255,0.4); }
        .nav-logo-text { font-family: 'Orbitron', sans-serif; font-size: 14px; letter-spacing: 2px; color: white; }
        
        .hero { position: relative; z-index: 1; text-align: center; padding: 80px 20px 60px; background: linear-gradient(to bottom, #0f172a 0%, var(--bg) 100%); }
        .hero h1 { font-family: 'Orbitron', sans-serif; font-size: clamp(2.2rem, 6vw, 4rem); font-weight: 900; letter-spacing: 5px; background: linear-gradient(135deg, #fff 30%, var(--neon)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 12px; }
        
        .main { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 0 24px 80px; }
        .section-title { font-family: 'Orbitron', sans-serif; font-size: 0.75rem; letter-spacing: 4px; color: #334155; text-transform: uppercase; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 1px solid rgba(255,255,255,0.04); }
        
        /* Games Grid */
        .games-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 16px; margin-bottom: 60px; }
        .game-card { background: var(--card); border: 1px solid rgba(255,255,255,0.06); border-radius: 12px; overflow: hidden; cursor: pointer; transition: 0.2s; position: relative; }
        .game-card:hover { transform: translateY(-4px); border-color: var(--neon); box-shadow: 0 8px 30px rgba(0,229,255,0.1); }
        .game-thumb { width: 100%; aspect-ratio: 16/9; display: flex; align-items: center; justify-content: center; font-size: 3rem; background: #001a0a; }
        .game-info { padding: 14px 16px; }
        .game-name { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: white; }

        /* Overlay & Game Window */
        .overlay { display: none; position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.85); backdrop-filter: blur(6px); align-items: center; justify-content: center; }
        .overlay.open { display: flex; }
        .game-window { background: #0a1628; border: 1px solid var(--neon); border-radius: 16px; width: min(500px, 95vw); position: relative; padding: 20px; text-align: center; }
        .window-close { position: absolute; top: 15px; right: 15px; background: none; border: none; color: white; font-size: 20px; cursor: pointer; }

        /* Snake Game Specifics */
        canvas { background: #000; border: 2px solid var(--green); display: block; margin: 20px auto; max-width: 100%; }
        .score { font-family: 'Orbitron', sans-serif; color: var(--green); font-size: 1.5rem; margin-bottom: 10px; }
    </style>
</head>
<body>

<nav>
    <div class="nav-logo">
        <div class="nav-logo-circle">KG</div>
        <span class="nav-logo-text">KREKER GAMES</span>
    </div>
</nav>

<div class="hero">
    <h1>KREKER GAMES</h1>
    <p style="color: #64748b; letter-spacing: 2px;">PRESS START TO PLAY</p>
</div>

<div class="main">
    <div class="section-title">Available Games</div>
    <div class="games-grid">
        <div class="game-card" onclick="openSnake()">
            <div class="game-thumb">🐍</div>
            <div class="game-info">
                <div class="game-name">SNAKER</div>
                <div style="font-size: 12px; color: #475569;">ARCADE CLASSIC</div>
            </div>
        </div>
    </div>
</div>

<div class="overlay" id="overlay">
    <div class="game-window">
        <button class="window-close" onclick="closeGame()">✕</button>
        <h2 id="gameTitle" style="font-family: 'Orbitron'; color: var(--neon); margin-bottom: 10px;">SNAKE</h2>
        <div class="score" id="score">0</div>
        <canvas id="snakeCanvas" width="400" height="400"></canvas>
        <p style="font-size: 12px; color: #64748b;">USE ARROW KEYS TO MOVE</p>
        <button onclick="startGame()" style="margin-top: 15px; padding: 10px 20px; background: var(--green); border: none; border-radius: 5px; cursor: pointer; font-weight: bold;">START AGAIN</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('snakeCanvas');
    const ctx = canvas.getContext('2d');
    const scoreElement = document.getElementById('score');
    const overlay = document.getElementById('overlay');

    let snake, food, direction, score, gameLoop;
    const box = 20;

    function openSnake() {
        overlay.classList.add('open');
        startGame();
    }

    function closeGame() {
        overlay.classList.remove('open');
        clearInterval(gameLoop);
    }

    function startGame() {
        clearInterval(gameLoop);
        snake = [{x: 10 * box, y: 10 * box}];
        direction = "RIGHT";
        score = 0;
        scoreElement.textContent = score;
        spawnFood();
        gameLoop = setInterval(draw, 100);
    }

    function spawnFood() {
        food = {
            x: Math.floor(Math.random() * 19 + 1) * box,
            y: Math.floor(Math.random() * 19 + 1) * box
        };
    }

    document.addEventListener("keydown", e => {
        if(e.keyCode == 37 && direction != "RIGHT") direction = "LEFT";
        else if(e.keyCode == 38 && direction != "DOWN") direction = "UP";
        else if(e.keyCode == 39 && direction != "LEFT") direction = "RIGHT";
        else if(e.keyCode == 40 && direction != "UP") direction = "DOWN";
    });

    function draw() {
        ctx.fillStyle = "black";
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        for(let i = 0; i < snake.length; i++) {
            ctx.fillStyle = (i == 0) ? "#22c55e" : "#166534";
            ctx.fillRect(snake[i].x, snake[i].y, box, box);
            ctx.strokeStyle = "black";
            ctx.strokeRect(snake[i].x, snake[i].y, box, box);
        }

        ctx.fillStyle = "red";
        ctx.fillRect(food.x, food.y, box, box);

        let snakeX = snake[0].x;
        let snakeY = snake[0].y;

        if(direction == "LEFT") snakeX -= box;
        if(direction == "UP") snakeY -= box;
        if(direction == "RIGHT") snakeX += box;
        if(direction == "DOWN") snakeY += box;

        if(snakeX == food.x && snakeY == food.y) {
            score++;
            scoreElement.textContent = score;
            spawnFood();
        } else {
            snake.pop();
        }

        let newHead = { x: snakeX, y: snakeY };

        if(snakeX < 0 || snakeX >= canvas.width || snakeY < 0 || snakeY >= canvas.height || collision(newHead, snake)) {
            clearInterval(gameLoop);
            alert("GAME OVER! Score: " + score);
        }

        snake.unshift(newHead);
    }

    function collision(head, array) {
        for(let i = 0; i < array.length; i++) {
            if(head.x == array[i].x && head.y == array[i].y) return true;
        }
        return false;
    }
</script>

</body>
</html>
